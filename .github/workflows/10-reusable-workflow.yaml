# Workflow name (GitHub Actions UI তে দেখাবে)
name: Reusable Backend Workflow

# reusable workflow define করা
on:
  workflow_call:

jobs:
  reusable-workflow-backend:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Code info print
      - name: Detect Backend Change
        run: echo "Backend code changed 🚀"

      # Step 2: Simulate backend install
      - name: Install Dependencies
        run: echo "npm install (simulated)"

      # Step 3: Simulate test run
      - name: Run Tests
        run: echo "npm test (simulated)"

      # Step 4: Simulate build
      - name: Build Project
        run: echo "npm run build (simulated)"

      # Final Step
      - name: Finish
        run: echo "Backend CI Completed ✅"
