# Workflow name (GitHub UI তে দেখাবে)
name: Happy New Year Workflow 🎉

# Trigger: প্রতি বছর January 1 তারিখে run হবে
on:
  schedule:
    - cron: "0 0 1 1 *" # Jan 1, 00:00 UTC

jobs:
  new-year-job:
    runs-on: ubuntu-latest

    steps:
      # Step 1: New Year message
      - name: Happy New Year Message
        run: echo "🎉 Happy New Year! Wishing you success, happiness & growth 🚀"

      # Step 2: Fun output
      - name: Celebration
        run: |
          echo "✨ Year = $(date +%Y)"
          echo "🚀 Keep Learning. Keep Building. Keep Growing."
